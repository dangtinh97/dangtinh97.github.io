<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Transfer Data - P2P</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <script src="scripts/utils.js"></script>
    <style>
        :root {
            --primary: #0d6efd;
        }
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #e0e7ff 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }
        .container {
            max-width: 980px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            margin: 2rem auto;
        }
        .header {
            background: linear-gradient(90deg, #0d6efd, #6610f2);
            color: white;
            padding: 1.8rem 2rem;
            text-align: center;
        }
        h1 {
            font-weight: 700;
            margin: 0;
            font-size: 2.1rem;
        }
        .code-display {
            background: #f8f9fa;
            border: 2px dashed #0d6efd;
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: 5px;
            padding: 1.2rem;
            border-radius: 14px;
            text-align: center;
            color: #0d6efd;
            margin: 1.5rem 0;
        }
        .qr-container {
            text-align: center;
            margin: 1rem 0 2rem;
        }
        .section-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #495057;
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 2px solid #e9ecef;
        }

        /* Chat Area */
        .chat-container {
            height: 420px;
            overflow-y: auto;
            padding: 1.2rem;
            background: #f8f9fa;
            border-radius: 14px;
            border: 1px solid #dee2e6;
        }
        .message {
            max-width: 82%;
            margin-bottom: 1.1rem;
            padding: 13px 17px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }
        .message.sent {
            background: #0d6efd;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        .message.received {
            background: #e9ecef;
            color: #212529;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }
        .message-time {
            font-size: 0.78rem;
            opacity: 0.75;
            margin-top: 6px;
            display: block;
        }
        .message img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 8px;
        }
        .file-message {
            background: white;
            border: 1px solid #dee2e6;
            padding: 14px;
            border-radius: 12px;
        }

        .form-control {
            border-radius: 10px;
        }
        .btn {
            border-radius: 10px;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(90deg, #0d6efd, #6610f2);
            border: none;
            padding: 0.75rem 2rem;
        }

        .progress {
            height: 9px;
            border-radius: 10px;
        }
        .indicator {
            font-size: 0.96rem;
            color: #6c757d;
        }
        .connected { color: #198754; font-weight: 600; }
        .disconnected { color: #dc3545; }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <h1><i class="fas fa-share-alt me-2"></i>Transfer Data</h1>
        <p class="mb-0 mt-2 opacity-75">Chia sẻ file &amp; văn bản nhanh chóng • P2P</p>
    </div>

    <div class="p-4">
        <!-- Mã của bạn -->
        <div class="text-center">
            <p class="text-muted mb-1">Mã kết nối của bạn</p>
            <div class="code-display" id="myCode">Đang tạo mã...</div>
        </div>

        <!-- QR Code -->
        <div class="qr-container">
            <div id="qrcode"></div>
            <small class="text-muted">Quét mã QR để kết nối nhanh</small>
        </div>

        <div class="text-center mb-4">
            <span class="connection-status" id="connectionStatus">
                <i class="fas fa-circle"></i> Chưa kết nối
            </span>
        </div>

        <!-- Kết nối -->
        <div class="mb-4" id="form-connect">
            <div class="input-group">
                <input type="text" class="form-control" id="peerCode"
                       placeholder="Nhập mã 5 ký tự của người kia" maxlength="5" style="text-transform: uppercase;">
                <button class="btn btn-outline-primary" id="btn-connect">
                    <i class="fas fa-link"></i> Kết nối
                </button>
            </div>
        </div>

        <div class="row g-4">
            <!-- Phần Gửi -->
            <div class="col-lg-6">
                <h5 class="section-title"><i class="fas fa-paper-plane"></i> Gửi nội dung</h5>

                <textarea class="form-control mb-3" id="textInput" rows="4"
                          placeholder="Nhập nội dung văn bản muốn gửi..."></textarea>

                <label class="form-label">Chọn file hoặc ảnh</label>
                <input type="file" class="form-control mb-3" id="fileInput">

                <button class="btn btn-primary w-100" id="send">
                    <i class="fas fa-paper-plane"></i> Gửi ngay
                </button>

                <!-- Progress gửi -->
                <div class="sending-indicator mt-3 text-center" id="sendingIndicator" style="display:none;">
                    <div class="indicator mb-1">
                        <span class="spinner-border spinner-border-sm text-primary"></span>
                        Đang gửi... <span id="sendProgressText">0%</span>
                    </div>
                    <div class="progress">
                        <div class="progress-bar bg-primary" id="sendProgressBar" style="width: 0%;"></div>
                    </div>
                </div>
            </div>

            <!-- Phần Nhận (Lịch sử) -->
            <div class="col-lg-6">
                <h5 class="section-title"><i class="fas fa-inbox"></i> Nội dung nhận được</h5>
                <div class="chat-container" id="receivedContainer">
                    <!-- Các tin nhắn sẽ được append vào đây -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // ==================== PHẦN CODE GỐC CỦA BẠN (giữ nguyên) ====================
        const codeInit = new URLSearchParams(window.location.search).get('code');
        const config = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun.l.google.com:5349" },
                { urls: "stun:stun1.l.google.com:3478" },
                { urls: "stun:stun1.l.google.com:5349" },
                { urls: "stun:stun2.l.google.com:19302" },
                { urls: "stun:stun2.l.google.com:5349" },
                { urls: "stun:stun3.l.google.com:3478" },
                { urls: "stun:stun3.l.google.com:5349" },
                { urls: "stun:stun4.l.google.com:19302" },
                { urls: "stun:stun4.l.google.com:5349" },
                { urls: "turn:global.relay.metered.ca:80", username: "54ed65db0aad025d8260edec", credential: "ZcuTU21CoQ+kpY/x" },
                { urls: "turn:global.relay.metered.ca:80?transport=tcp", username: "54ed65db0aad025d8260edec", credential: "ZcuTU21CoQ+kpY/x" },
                { urls: "turn:global.relay.metered.ca:443", username: "54ed65db0aad025d8260edec", credential: "ZcuTU21CoQ+kpY/x" },
                { urls: "turns:global.relay.metered.ca:443?transport=tcp", username: "54ed65db0aad025d8260edec", credential: "ZcuTU21CoQ+kpY/x" },
            ]
        };

        let myCode = Math.floor(10000 + Math.random() * 90000).toString();
        document.getElementById('myCode').textContent = myCode;

        // Tạo QR Code
        new QRCode(document.getElementById('qrcode'), {
            text: `https://dangtinh97.github.io/dev-tool/p2p-share.html?code=${myCode}`,
            width: 200,
            height: 200,
            colorDark: '#0d6efd',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.L
        });

        let peerCode = '';
        let peer = new RTCPeerConnection(config);
        let dataChannel;
        const socket = io('https://tool.myoupip.com/p2p-connect', {
            transports: ['websocket', 'polling'],
            auth: { room_id: myCode }
        });

        socket.on('connect', () => {
            if (codeInit) {
                peerCode = codeInit;
                setTimeout(() => connectSocket(codeInit), 1000);
            }

            socket.on('JOIN', (data) => {
                $('#btn-connect').attr('disabled', true);
                $('#peerCode').attr('readonly', true);
                if (peerCode === '') {
                    $('#peerCode').val(data.room_id);
                    peerCode = data.room_id;
                    dataChannel = peer.createDataChannel('chat');
                    setupDataChannel(dataChannel);
                    peer.createOffer().then(offer => {
                        peer.setLocalDescription(offer);
                        socket.emit('SIGNALING', { room_id: peerCode, type: 'offer', offer: offer });
                    });
                }
            });

            socket.on('SIGNALING', (res) => {
                const { type } = res;
                if (type === 'offer') handlerOffer(res.offer);
                if (type === 'answer') handlerAnswer(res.answer);
                if (type === 'ice-candidate') handlerCandidate(res.candidate);
            });
        });

        const handlerCandidate = async (candidate) => {
            try { await peer.addIceCandidate(candidate); } catch (err) { console.error(err); }
        };

        const handlerOffer = async (offer) => {
            await peer.setRemoteDescription(offer);
            peer.ondatachannel = event => setupDataChannel(event.channel);
            const answer = await peer.createAnswer();
            await peer.setLocalDescription(answer);
            socket.emit('SIGNALING', { room_id: peerCode, type: 'answer', answer: answer });
        };

        const handlerAnswer = async (answer) => {
            await peer.setRemoteDescription(answer);
        };

        peer.onicecandidate = event => {
            if (event.candidate) {
                socket.emit('SIGNALING', {
                    room_id: peerCode,
                    type: 'ice-candidate',
                    candidate: event.candidate
                });
            }
        };

        const connectionStatus = document.getElementById('connectionStatus');
        let isConnected = false;
        peer.oniceconnectionstatechange = () => {
            if (peer.iceConnectionState === 'connected' || peer.iceConnectionState === 'completed') {
                if (!isConnected) {
                    isConnected = true;
                    connectionStatus.innerHTML = `<i class="fas fa-circle"></i> Đã kết nối với ${peerCode}`;
                    connectionStatus.className = 'connected';
                    $('#form-connect').remove();
                    $('#qrcode').parent().remove(); // Ẩn QR sau khi kết nối
                }
            } else if (['disconnected', 'failed', 'closed'].includes(peer.iceConnectionState)) {
                isConnected = false;
                connectionStatus.innerHTML = `<i class="fas fa-circle"></i> Mất kết nối`;
                connectionStatus.className = 'disconnected';
            }
        };

        // ==================== SETUP DATA CHANNEL (giữ nguyên logic cũ) ====================
        function setupDataChannel(channel) {
            dataChannel = channel;
            let receivedChunks = [];
            let fileMeta = null;
            let receivedBytes = 0;

            dataChannel.onmessage = (event) => {
                if (typeof event.data === 'string') {
                    const message = JSON.parse(event.data);
                    if (message.type === 'text') {
                        displayReceivedContent({ text: message.message });
                    } else if (message.type === 'file_start') {
                        fileMeta = message.message.file;
                        receivedChunks = [];
                        receivedBytes = 0;
                        $('#receivingIndicator').show(); // Nếu bạn muốn giữ indicator
                    } else if (message.type === 'file_complete') {
                        const blob = new Blob(receivedChunks);
                        const url = URL.createObjectURL(blob);
                        displayReceivedContent({
                            file: { name: fileMeta.name, data: url, type: fileMeta.type }
                        });
                        receivedChunks = [];
                        fileMeta = null;
                        receivedBytes = 0;
                        updateReceiveProgress(0);
                    }
                } else {
                    receivedChunks.push(event.data);
                    receivedBytes += event.data.byteLength;
                    if (fileMeta) {
                        const percentage = Math.min(100, Math.round((receivedBytes / fileMeta.size) * 100));
                        updateReceiveProgress(percentage);
                    }
                }
            };
        }

        // ==================== HÀM HIỂN THỊ TIN NHẮN MỚI (APPEND) ====================
        function addMessage(content, isSent = false) {
            const container = document.getElementById('receivedContainer');
            const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

            let html = '';

            if (content.text) {
                html = `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        ${content.text}
                        <span class="message-time">${time}</span>
                    </div>`;
            }
            else if (content.file) {
                if (content.file.type && content.file.type.startsWith('image/')) {
                    html = `
                        <div class="message ${isSent ? 'sent' : 'received'}">
                            <img src="${content.file.data}" alt="${content.file.name}">
                            <span class="message-time">${time} • ${content.file.name}</span>
                        </div>`;
                } else {
                    html = `
                        <div class="message ${isSent ? 'sent' : 'received'} file-message">
                            <i class="fas fa-file me-2"></i>${content.file.name}
                            <button class="btn btn-sm btn-outline-primary mt-2 w-100"
                                    onclick="downloadFile('${content.file.data}', '${content.file.name}')">
                                <i class="fas fa-download"></i> Tải xuống
                            </button>
                            <span class="message-time">${time}</span>
                        </div>`;
                }
            }

            container.insertAdjacentHTML('beforeend', html);
            container.scrollTop = container.scrollHeight;
        }

        // Ghi đè hàm hiển thị cũ
        window.displayReceivedContent = function(content) {
            addMessage(content, false);   // Tin nhận được
        };

        // ==================== CÁC HÀM CŨ KHÁC (giữ nguyên) ====================
        function generateCode() {
            return Math.floor(10000 + Math.random() * 90000).toString();
        }

        $('#btn-connect').on('click', () => {
            peerCode = document.getElementById('peerCode').value.trim().toUpperCase();
            if (peerCode.length !== 5) {
                alert('Mã phải có 5 ký tự!');
                return;
            }
            connectSocket(peerCode);
        });

        function connectSocket(code) {
            socket.emit('JOIN', { room_id: code });
        }

        $('#send').on('click', () => {
            const text = document.getElementById('textInput').value.trim();
            const sendButton = $('#send');
            const sendingIndicator = $('#sendingIndicator');

            if (text !== '') {
                sendButton.attr('disabled', true);
                sendingIndicator.show();

                dataChannel.send(JSON.stringify({ type: 'text', message: text }));
                addMessage({ text: text }, true);   // Hiển thị tin đã gửi

                document.getElementById('textInput').value = '';
                setTimeout(() => {
                    sendButton.attr('disabled', false);
                    sendingIndicator.hide();
                    updateSendProgress(0);
                }, 600);
                return;
            }

            const file = document.getElementById('fileInput').files[0];
            if (file) {
                const chunkSize = 16384;
                const reader = new FileReader();
                let sentBytes = 0;

                sendButton.attr('disabled', true);
                sendingIndicator.show();

                dataChannel.send(JSON.stringify({
                    type: 'file_start',
                    message: { file: { name: file.name, size: file.size, type: file.type } }
                }));

                function sendChunk(offset) {
                    const slice = file.slice(offset, offset + chunkSize);
                    reader.onload = () => {
                        if (dataChannel.readyState === 'open') {
                            dataChannel.send(reader.result);
                            sentBytes += slice.size;
                            const percentage = Math.min(100, Math.round((sentBytes / file.size) * 100));
                            updateSendProgress(percentage);

                            if (offset + chunkSize < file.size) {
                                sendNextChunk(offset + chunkSize);
                            } else {
                                dataChannel.send(JSON.stringify({ type: 'file_complete' }));
                                addMessage({ file: { name: file.name, data: URL.createObjectURL(file), type: file.type } }, true);
                                document.getElementById('fileInput').value = '';
                                sendButton.attr('disabled', false);
                                sendingIndicator.hide();
                                updateSendProgress(0);
                            }
                        }
                    };
                    reader.readAsArrayBuffer(slice);
                }

                function sendNextChunk(offset) {
                    if (dataChannel.bufferedAmount > dataChannel.bufferedAmountLowThreshold) {
                        dataChannel.onbufferedamountlow = () => {
                            dataChannel.onbufferedamountlow = null;
                            sendChunk(offset);
                        };
                    } else {
                        sendChunk(offset);
                    }
                }

                sendChunk(0);
            }
        });

        function updateSendProgress(percentage) {
            $('#sendProgressText').text(`${percentage}%`);
            $('#sendProgressBar').css('width', `${percentage}%`);
        }

        function updateReceiveProgress(percentage) {
            // Nếu bạn muốn hiển thị progress nhận, có thể thêm indicator tương tự
            console.log('Receiving progress:', percentage);
        }

        window.downloadFile = function(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };
    });
</script>
</body>
</html>
