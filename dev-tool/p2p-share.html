<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Data - P2P</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0d6efd;
        }
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #e0e7ff 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }
        .container {
            max-width: 980px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }
        .header {
            background: linear-gradient(90deg, #0d6efd, #6610f2);
            color: white;
            padding: 1.5rem 2rem;
            text-align: center;
        }
        h1 {
            font-weight: 700;
            margin: 0;
            font-size: 2rem;
        }
        .code-display {
            background: #f8f9fa;
            border: 2px dashed #0d6efd;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 4px;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            color: #0d6efd;
            margin: 1.5rem 0;
        }
        .qr-container {
            text-align: center;
            margin: 1rem 0 2rem;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #495057;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e9ecef;
        }

        /* Chat / Received Area */
        .chat-container {
            height: 380px;
            overflow-y: auto;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #dee2e6;
        }
        .message {
            max-width: 85%;
            margin-bottom: 1rem;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
        }
        .message.sent {
            background: #0d6efd;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            background: #e9ecef;
            color: #212529;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 4px;
        }
        .message img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 8px;
        }
        .file-message {
            background: white;
            border: 1px solid #dee2e6;
            padding: 12px;
            border-radius: 12px;
        }

        .form-control, .btn {
            border-radius: 10px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #0d6efd, #6610f2);
            border: none;
            padding: 0.75rem 2rem;
            font-weight: 600;
        }
        .btn-outline-primary {
            border-radius: 10px;
        }

        .progress {
            height: 8px;
            border-radius: 10px;
        }
        .indicator {
            font-size: 0.95rem;
            color: #6c757d;
        }

        .connected {
            color: #198754;
            font-weight: 600;
        }
        .disconnected {
            color: #dc3545;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <h1><i class="fas fa-share-alt me-2"></i>Transfer Data</h1>
        <p class="mb-0 mt-1 opacity-75">Chia sẻ nhanh - P2P • Không lưu dữ liệu</p>
    </div>

    <div class="p-4">
        <!-- Mã của bạn + QR -->
        <div class="text-center">
            <p class="text-muted mb-1">Mã của bạn</p>
            <div class="code-display" id="myCode">Đang tạo mã...</div>
        </div>

        <div class="qr-container">
            <div id="qrcode"></div>
            <small class="text-muted">Quét mã QR để kết nối nhanh</small>
        </div>

        <div class="connection-status text-center mb-3" id="connectionStatus">
            <i class="fas fa-circle"></i> Chưa kết nối
        </div>

        <!-- Kết nối với người khác -->
        <div class="mb-4" id="form-connect">
            <div class="input-group">
                <input type="text" class="form-control" id="peerCode"
                       placeholder="Nhập mã 5 ký tự của người kia" maxlength="5">
                <button class="btn btn-outline-primary" id="btn-connect">
                    <i class="fas fa-link"></i> Kết nối
                </button>
            </div>
        </div>

        <div class="row">
            <!-- Gửi dữ liệu -->
            <div class="col-lg-6 mb-4">
                <h5 class="section-title"><i class="fas fa-paper-plane"></i> Gửi nội dung</h5>

                <textarea class="form-control mb-3" id="textInput" rows="3"
                          placeholder="Nhập văn bản muốn gửi..."></textarea>

                <div class="mb-3">
                    <label class="form-label">Chọn file hoặc ảnh</label>
                    <input type="file" class="form-control" id="fileInput">
                </div>

                <button class="btn btn-primary w-100" id="send">
                    <i class="fas fa-paper-plane"></i> Gửi ngay
                </button>

                <div class="sending-indicator mt-3 text-center" id="sendingIndicator" style="display:none;">
                    <div class="indicator">
                        <div class="spinner-border spinner-border-sm text-primary me-2"></div>
                        Đang gửi... <span id="sendProgressText">0%</span>
                    </div>
                    <div class="progress mt-2">
                        <div class="progress-bar bg-primary" id="sendProgressBar" style="width: 0%;"></div>
                    </div>
                </div>
            </div>

            <!-- Nhận dữ liệu -->
            <div class="col-lg-6">
                <h5 class="section-title"><i class="fas fa-inbox"></i> Nội dung nhận được</h5>

                <div class="chat-container" id="receivedContainer">
                    <!-- Tin nhắn sẽ được append vào đây -->
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const myCode = Math.floor(10000 + Math.random() * 90000).toString();
        document.getElementById('myCode').textContent = myCode;

        // Tạo QR Code
        new QRCode(document.getElementById('qrcode'), {
            text: `https://dangtinh97.github.io/dev-tool/p2p-share.html?code=${myCode}`,
            width: 180,
            height: 180,
            colorDark: "#0d6efd",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.L
        });

        // ... (phần WebRTC + Socket code giữ nguyên như cũ của bạn)

        // ==================== THAY ĐỔI QUAN TRỌNG: Hiển thị nhiều tin nhắn ====================
        function addMessage(content, isMine = false) {
            const container = document.getElementById('receivedContainer');
            const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

            let html = '';

            if (content.text) {
                html = `
                    <div class="message ${isMine ? 'sent' : 'received'}">
                        <div>${content.text}</div>
                        <div class="message-time">${time}</div>
                    </div>`;
            }
            else if (content.file) {
                if (content.file.type && content.file.type.startsWith('image/')) {
                    html = `
                        <div class="message ${isMine ? 'sent' : 'received'}">
                            <img src="${content.file.data}" alt="${content.file.name}">
                            <div class="message-time">${time} • ${content.file.name}</div>
                        </div>`;
                } else {
                    html = `
                        <div class="message ${isMine ? 'sent' : 'received'} file-message">
                            <i class="fas fa-file me-2"></i> ${content.file.name}
                            <button class="btn btn-sm btn-outline-primary mt-2" onclick="downloadFile('${content.file.data}', '${content.file.name}')">
                                <i class="fas fa-download"></i> Tải xuống
                            </button>
                            <div class="message-time">${time}</div>
                        </div>`;
                }
            }

            container.insertAdjacentHTML('beforeend', html);
            container.scrollTop = container.scrollHeight;
        }

        // Ghi đè hàm displayReceivedContent cũ
        window.displayReceivedContent = function(content) {
            addMessage(content, false);   // false = tin nhận được
        };

        // Khi gửi text hoặc file thành công, cũng hiển thị luôn ở bên gửi
        const originalSendText = $('#send').on('click', function() {
            // ... code gửi cũ của bạn ...

            // Thêm phần hiển thị tin nhắn đã gửi
            const text = document.getElementById('textInput').value.trim();
            if (text) {
                addMessage({ text: text }, true);
            }
            // File sẽ được xử lý trong hàm sendChunk khi hoàn thành nếu bạn muốn
        });

        // ==================== Giữ nguyên phần code WebRTC, Socket, DataChannel của bạn ====================
        // (Bạn chỉ cần copy phần script cũ từ <script> đến hết và thay hàm displayReceivedContent bằng hàm addMessage như trên)

        // Tải file (hàm global để onclick hoạt động)
        window.downloadFile = function(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };
    });
</script>
</body>
</html>
