<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ESP32 / ESP8266 Serial Monitor</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #020617;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
    }

    .sidebar {
      border-right: 1px solid #1e293b;
      background: #0f172a;
      padding: 20px;
      overflow-y: auto;
    }

    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    h1 {
      font-size: 22px;
      margin-top: 0;
      margin-bottom: 20px;
    }

    .card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card h2 {
      margin-top: 0;
      font-size: 15px;
      color: #93c5fd;
    }

    button {
      width: 100%;
      border: none;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
      background: #2563eb;
      color: white;
    }

    button:hover {
      opacity: 0.92;
    }

    .danger {
      background: #dc2626;
    }

    input,
    select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #020617;
      color: white;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid #1e293b;
      background: #0f172a;
    }

    .stat {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 14px;
    }

    .stat-title {
      font-size: 12px;
      color: #94a3b8;
    }

    .stat-value {
      font-size: 22px;
      font-weight: bold;
      margin-top: 6px;
    }

    .terminal {
      flex: 1;
      overflow: auto;
      padding: 20px;
      background: #000;
      font-family: Consolas, monospace;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre;
    }

    .line {
      margin-bottom: 2px;
    }

    .info {
      color: #38bdf8;
    }

    .warn {
      color: #facc15;
    }

    .error {
      color: #f87171;
    }

    .success {
      color: #4ade80;
    }

    .footer {
      display: flex;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid #1e293b;
      background: #0f172a;
    }

    .footer input {
      flex: 1;
      margin: 0;
    }

    .footer button {
      width: 140px;
      margin: 0;
    }

    .file-item {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: #020617;
      border: 1px solid #1e293b;
      font-size: 13px;
    }

    .status {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #1e293b;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

<div class="layout">

  <div class="sidebar">

    <h1>ESP Monitor</h1>

    <div class="card">
      <h2>Serial</h2>

      <select id="baudRate">
        <option>9600</option>
        <option selected>115200</option>
        <option>230400</option>
      </select>

      <button onclick="connectSerial()">
        Connect Serial
      </button>

      <button onclick="disconnectSerial()" class="danger">
        Disconnect
      </button>

      <div class="status" id="status">
        Disconnected
      </div>
    </div>

    <div class="card">
      <h2>Firmware BIN</h2>

      <input type="file" id="binInput" accept=".bin" />

      <button onclick="uploadBin()">
        Upload BIN
      </button>

      <div id="firmwareList"></div>
    </div>

    <div class="card">
      <h2>Filter</h2>

      <select id="filter" onchange="renderLogs()">
        <option value="all">All</option>
        <option value="info">Info</option>
        <option value="warn">Warn</option>
        <option value="error">Error</option>
        <option value="success">Success</option>
      </select>

      <input
        type="text"
        id="search"
        placeholder="Search logs..."
        onkeyup="renderLogs()"
      />

      <button class="danger" onclick="clearLogs()">
        Clear Logs
      </button>
    </div>

  </div>

  <div class="main">

    <div class="stats">

      <div class="stat">
        <div class="stat-title">TOTAL</div>
        <div class="stat-value" id="totalLogs">0</div>
      </div>

      <div class="stat">
        <div class="stat-title">ERROR</div>
        <div class="stat-value" id="errorLogs">0</div>
      </div>

      <div class="stat">
        <div class="stat-title">WARN</div>
        <div class="stat-value" id="warnLogs">0</div>
      </div>

      <div class="stat">
        <div class="stat-title">FIRMWARE</div>
        <div class="stat-value" id="firmwareCount">0</div>
      </div>

    </div>

    <div class="terminal" id="terminal"></div>

    <div class="footer">

      <input
        type="text"
        id="fakeInput"
        placeholder="Fake log for testing..."
      />

      <button onclick="fakeLog()">
        Add Log
      </button>

    </div>

  </div>

</div>

<script>

  let port = null;
  let reader = null;

  let serialBuffer = '';

  let logs = [];
  let firmwareFiles = [];

  const terminal = document.getElementById('terminal');

  function addLog(message, type = 'info') {

    logs.push({
      message,
      type,
      time: new Date().toLocaleTimeString(),
    });

    renderLogs();
    updateStats();
  }

  function renderLogs() {

    const filter = document.getElementById('filter').value;
    const keyword = document
      .getElementById('search')
      .value
      .toLowerCase();

    terminal.innerHTML = '';

    for (const log of logs) {

      if (filter !== 'all' && log.type !== filter) {
        continue;
      }

      if (
        keyword &&
        !log.message.toLowerCase().includes(keyword)
      ) {
        continue;
      }

      const div = document.createElement('div');

      div.className = `line ${log.type}`;

      div.textContent =
        `[${log.time}] [${log.type.toUpperCase()}] ${log.message}`;

      terminal.appendChild(div);
    }

    terminal.scrollTop = terminal.scrollHeight;
  }

  function updateStats() {

    document.getElementById('totalLogs').textContent =
      logs.length;

    document.getElementById('errorLogs').textContent =
      logs.filter(l => l.type === 'error').length;

    document.getElementById('warnLogs').textContent =
      logs.filter(l => l.type === 'warn').length;

    document.getElementById('firmwareCount').textContent =
      firmwareFiles.length;
  }

  function clearLogs() {

    logs = [];

    renderLogs();
    updateStats();
  }

  function detectType(line) {

    const lower = line.toLowerCase();

    if (
      lower.includes('error') ||
      lower.includes('panic') ||
      lower.includes('guru')
    ) {
      return 'error';
    }

    if (lower.includes('warn')) {
      return 'warn';
    }

    if (
      lower.includes('connected') ||
      lower.includes('success') ||
      lower.includes('ok')
    ) {
      return 'success';
    }

    return 'info';
  }

  async function connectSerial() {

    if (!('serial' in navigator)) {

      addLog(
        'Web Serial API not supported',
        'error'
      );

      return;
    }

    try {

      port = await navigator.serial.requestPort();

      const baudRate =
        parseInt(document.getElementById('baudRate').value);

      await port.open({
        baudRate,
      });

      document.getElementById('status').innerText =
        'Connected';

      addLog(
        `Serial connected at ${baudRate}`,
        'success'
      );

      const decoder = new TextDecoderStream();

      port.readable.pipeTo(decoder.writable);

      reader = decoder.readable.getReader();

      while (true) {

        const { value, done } =
          await reader.read();

        if (done) {
          break;
        }

        if (value) {
          parseSerialData(value);
        }
      }

    } catch (err) {

      addLog(
        `Connect failed: ${err.message}`,
        'error'
      );
    }
  }

  async function disconnectSerial() {

    try {

      if (reader) {
        await reader.cancel();
        reader = null;
      }

      if (port) {
        await port.close();
        port = null;
      }

      document.getElementById('status').innerText =
        'Disconnected';

      addLog(
        'Serial disconnected',
        'warn'
      );

    } catch (err) {

      addLog(
        `Disconnect failed: ${err.message}`,
        'error'
      );
    }
  }

  function parseSerialData(text) {

    serialBuffer += text;

    const lines = serialBuffer.split('\n');

    serialBuffer = lines.pop();

    for (let line of lines) {

      line = line.replace(/\r/g, '');

      if (!line.trim()) {
        continue;
      }

      const type = detectType(line);

      addLog(line, type);
    }
  }

  function uploadBin() {

    const input =
      document.getElementById('binInput');

    const file = input.files[0];

    if (!file) {

      alert('Please select .bin firmware');

      return;
    }

    firmwareFiles.push(file);

    const div = document.createElement('div');

    div.className = 'file-item';

    div.innerHTML = `
      <strong>${file.name}</strong><br>
      ${(file.size / 1024).toFixed(2)} KB
    `;

    document
      .getElementById('firmwareList')
      .appendChild(div);

    addLog(
      `Firmware uploaded: ${file.name}`,
      'success'
    );

    updateStats();
  }

  function fakeLog() {

    const input =
      document.getElementById('fakeInput');

    if (!input.value.trim()) {
      return;
    }

    const type = detectType(input.value);

    addLog(input.value, type);

    input.value = '';
  }

  addLog(
    'ESP Serial Monitor Ready',
    'success'
  );

</script>

</body>
</html>
