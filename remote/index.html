<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Smart Remote</title>

  <style>
      body {
          margin: 0;
          background: #111;
          overflow: hidden;
      }

      /* wrapper */
      .wrapper {
          width: 100vw;
          height: 100vh;
          position: relative;
      }

      /* ===== DEFAULT: PC (LANDSCAPE) ===== */
      .remote {
          width: 700px;
          height: 250px;
          background: linear-gradient(145deg, #ddd, #bbb);
          border-radius: 20px;

          display: flex;
          justify-content: space-around;
          align-items: center;

          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
      }

      /* ===== MOBILE: PORTRAIT ===== */
      @media (orientation: portrait) {
          .remote {
              width: 100vh;
              height: 100vw;

              transform: translate(-50%, -50%) rotate(90deg);
          }
      }

      /* group */
      .group {
          display: flex;
      }

      /* DPAD */
      .dpad {
          position: relative;
          width: 190px;
          height: 190px;
      }

      /* button */
      .btn {
          position: absolute;
          background: #222;
          color: white;
          border: none;
          border-radius: 12px;
          width: 60px;
          height: 60px;
          font-size: 18px;
          cursor: pointer;
      }

      .btn:active {
          background: #555;
      }

      /* vị trí */
      .up    { top: 0; left: 50%; transform: translateX(-50%); }
      .down  { bottom: 0; left: 50%; transform: translateX(-50%); }
      .left  { left: 0; top: 50%; transform: translateY(-50%); }
      .right { right: 0; top: 50%; transform: translateY(-50%); }
      .center {
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
      }

      /* middle */
      .middle {
          display: grid;
          grid-template-columns: repeat(2, 60px);
          gap: 12px;
      }

      .middle .btn {
          position: static;
      }

      /* scale cho màn nhỏ PC */
      @media (max-width: 900px) and (orientation: landscape) {
          .remote {
              transform: translate(-50%, -50%) scale(0.8);
          }
      }
  </style>
</head>

<body>

<div class="wrapper">
  <div class="remote">

    <!-- LEFT -->
    <div class="group">
      <div class="dpad">
        <button class="btn up" onclick="send('forward1')">↑</button>
        <button class="btn down" onclick="send('backward1')">↓</button>
        <button class="btn left" onclick="send('left1')">←</button>
        <button class="btn right" onclick="send('right1')">→</button>
        <button class="btn center" onclick="send('bark1')">🎵</button>
      </div>
    </div>

    <!-- MIDDLE -->
    <div class="middle">
      <button class="btn" style="display: none" onclick="send('action')">🤖</button>
      <button class="btn" style="display: none" onclick="send('setting')">⚙️</button>
      <button class="btn" onclick="send('sit')">🐶</button>
      <button class="btn" onclick="send('stand')">🎧</button>
      <button class="btn" onclick="send('stop')">⏺</button>
      <button class="btn" onclick="send('volume')">🔊</button>
    </div>

    <!-- RIGHT -->
    <div class="group">
      <div class="dpad">
        <button class="btn up" onclick="send('forward')">↑</button>
        <button class="btn down" onclick="send('backward')">↓</button>
        <button class="btn left" onclick="send('left')">←</button>
        <button class="btn right" onclick="send('right')">→</button>
        <button class="btn center" onclick="send('bark')">🎵</button>
      </div>
    </div>
  </div>
</div>

<script>
  const urls = {
    'dev':'ws://54.151.162.201:8000/ws',
    'localhost':'ws://localhost:8000/ws'
  }
  const MODE = 'dev'
  const ws = new WebSocket(`${urls[MODE]}?mac=11111111`)
  function send(cmd) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      alert("WS not ready");
      return;
    }
    ws.send(JSON.stringify({
      type:'remote',
      data:cmd
    }))
  }
</script>

</body>
</html>
